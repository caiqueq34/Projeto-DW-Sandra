 <!-- BOTÃO FLUTUANTE VOLTAR AO TOPO -->
    <button class="topo-float" id="topo-float" aria-label="Voltar ao topo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
        <span class="topo-tooltip">Voltar ao topo</span>
    </button>

    <script>
        // MENU SANDUÍCHE
        const btnHamburger = document.querySelector('.menu-hamburger');
        const menuNav = document.querySelector('.menu-nav');

        btnHamburger.addEventListener('click', () => {
            menuNav.classList.toggle('active');
            btnHamburger.classList.toggle('active');
        });

        // PRODUTOS DA FOCINHO E CIA
        const produtos = [
            { id: 1, nome: "Ração Premium Cães Adultos 15kg", preco: 189.90, categoria: "racao", img: "https://images.unsplash.com/photo-1589924691995-400dc9ecc119?q=80&w=600&auto=format&fit=crop" },
            { id: 2, nome: "Ração Hipoalergênica Gatos 7.5kg", preco: 149.90, categoria: "racao", img: "https://images.unsplash.com/photo-1548767797-d8c844163c4c?q=80&w=600&auto=format&fit=crop" },
            { id: 3, nome: "Brinquedo Mordedor Ossinho", preco: 29.90, categoria: "brinquedo", img: "https://images.unsplash.com/photo-1601758228041-f3b2795255f1?q=80&w=600&auto=format&fit=crop" },
            { id: 4, nome: "Bolinha Interativa com Petisco", preco: 39.90, categoria: "brinquedo", img: "https://images.unsplash.com/photo-1576201836106-db1758fd1c97?q=80&w=600&auto=format&fit=crop" },
            { id: 5, nome: "Coleira Peitoral Ajustável", preco: 59.90, categoria: "acessorio", img: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=600&auto=format&fit=crop" },
            { id: 6, nome: "Caminha Ortopédica G", preco: 199.90, categoria: "acessorio", img: "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=600&auto=format&fit=crop" },
            { id: 7, nome: "Shampoo Hipoalergênico 500ml", preco: 34.90, categoria: "higiene", img: "https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?q=80&w=600&auto=format&fit=crop" },
            { id: 8, nome: "Lenços Umedecidos Pet 80un", preco: 22.90, categoria: "higiene", img: "https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?q=80&w=600&auto=format&fit=crop" }
        ];

        let carrinho = JSON.parse(localStorage.getItem('carrinhoFocinho')) || [];

        const listaProdutos = document.getElementById('lista-produtos');
        const carrinhoItens = document.getElementById('carrinho-itens');
        const carrinhoTotal = document.getElementById('carrinho-total');
        const carrinhoContador = document.querySelector('.carrinho-contador');
        const carrinhoEl = document.getElementById('carrinho');
        const overlay = document.getElementById('carrinho-overlay');
        const btnTopo = document.getElementById('topo-float');

        // RENDERIZAR PRODUTOS
        function renderizarProdutos(categoria = 'todos') {
            listaProdutos.innerHTML = '';
            const produtosFiltrados = categoria === 'todos' 
                ? produtos 
                : produtos.filter(p => p.categoria === categoria);

            produtosFiltrados.forEach(produto => {
                const card = document.createElement('div');
                card.className = 'produto-card';
                card.innerHTML = `
                    <img src="${produto.img}" alt="${produto.nome}">
                    <div class="produto-info">
                        <h3>${produto.nome}</h3>
                        <p class="produto-preco">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
                        <button class="btn-add-carrinho" onclick="addCarrinho(${produto.id})">
                            Adicionar ao Carrinho
                        </button>
                    </div>
                `;
                listaProdutos.appendChild(card);
            });
        }

        // FILTROS
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filtro-btn.active').classList.remove('active');
                btn.classList.add('active');
                renderizarProdutos(btn.dataset.categoria);
            });
        });

        // ADICIONAR AO CARRINHO
        function addCarrinho(id) {
            const produto = produtos.find(p => p.id === id);
            const itemExistente = carrinho.find(item => item.id === id);

            if (itemExistente) {
                itemExistente.qtd++;
            } else {
                carrinho.push({ ...produto, qtd: 1 });
            }

            salvarCarrinho();
            atualizarCarrinho();
            abrirCarrinho();
        }

        // ATUALIZAR CARRINHO
        function atualizarCarrinho() {
            if (carrinho.length === 0) {
                carrinhoItens.innerHTML = '<p class="carrinho-vazio">Seu carrinho está vazio</p>';
            } else {
                carrinhoItens.innerHTML = carrinho.map(item => `
                    <div class="carrinho-item">
                        <img src="${item.img}" alt="${item.nome}">
                        <div class="carrinho-item-info">
                            <h4>${item.nome}</h4>
                            <p>R$ ${item.preco.toFixed(2).replace('.', ',')}</p>
                            <div class="carrinho-qtd">
                                <button onclick="alterarQtd(${item.id}, -1)">-</button>
                                <span>${item.qtd}</span>
                                <button onclick="alterarQtd(${item.id}, 1)">+</button>
                            </div>
                        <button class="remover-item" onclick="removerItem(${item.id})">&times;</button>
                    </div>
                `).join('');
            }

            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            const qtdTotal = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            
            carrinhoTotal.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
            carrinhoContador.textContent = qtdTotal;
            carrinhoContador.style.display = qtdTotal > 0 ? 'flex' : 'none';
        }

        function alterarQtd(id, delta) {
            const item = carrinho.find(item => item.id === id);
            item.qtd += delta;
            if (item.qtd <= 0) {
                removerItem(id);
            } else {
                salvarCarrinho();
                atualizarCarrinho();
            }
        }

        function removerItem(id) {
            carrinho = carrinho.filter(item => item.id !== id);
            salvarCarrinho();
            atualizarCarrinho();
        }

        function salvarCarrinho() {
            localStorage.setItem('carrinhoFocinho', JSON.stringify(carrinho));
        }

        // ABRIR/FECHAR CARRINHO
        function abrirCarrinho() {
            carrinhoEl.classList.add('active');
            overlay.classList.add('active');
        }

        function fecharCarrinho() {
            carrinhoEl.classList.remove('active');
            overlay.classList.remove('active');
        }

        document.getElementById('abrir-carrinho').addEventListener('click', abrirCarrinho);
        document.getElementById('fechar-carrinho').addEventListener('click', fecharCarrinho);
        overlay.addEventListener('click', fecharCarrinho);

        // BOTÃO VOLTAR AO TOPO
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                btnTopo.classList.add('visivel');
            } else {
                btnTopo.classList.remove('visivel');
            }
        });

        btnTopo.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // FINALIZAR COMPRA
        document.getElementById('finalizar-compra').addEventListener('click', () => {
            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio!');
                return;
            }
            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            alert(`Compra finalizada! Total: R$ ${total.toFixed(2).replace('.', ',')}\n\nObrigado por escolher a Focinho e Cia!`);
            carrinho = [];
            salvarCarrinho();
            atualizarCarrinho();
            fecharCarrinho();
        });

        // INICIALIZAR
        renderizarProdutos();
        atualizarCarrinho();
    </script>
</body>
</html>
