<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="produtos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo-focinho-cia.png">
    <title>Produtos - Focinho e Cia</title>
</head>
<body>

    <header>
        <div class="logo-header">
            <a href="index.html" class="logo-link">
                <img src="img/logo-focinho-cia.png" alt="Logo Focinho e Cia - Voltar para página inicial" class="logo-img">
            </a>
        </div>

        <button class="menu-hamburger" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="menu-nav">
            <a href="quemSomos.html">Quem somos</a>
            <a href="servicos.html">Serviços</a>
            <a href="produtos.html" class="active">Produtos</a>
            <a href="contato.html">Contato</a>
        </nav>

        <button class="carrinho-icon" id="abrir-carrinho" aria-label="Abrir carrinho">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="carrinho-contador">0</span>
        </button>
    </header>

    <main>
        <section class="container">
            <h2>Nossa Lojinha Pet</h2>
            <p>Rações premium, brinquedos educativos e acessórios exclusivos pro seu melhor amigo!</p>

            <div class="filtros">
                <button class="filtro-btn active" data-categoria="todos">Todos</button>
                <button class="filtro-btn" data-categoria="racao">Rações</button>
                <button class="filtro-btn" data-categoria="brinquedo">Brinquedos</button>
                <button class="filtro-btn" data-categoria="acessorio">Acessórios</button>
                <button class="filtro-btn" data-categoria="higiene">Higiene</button>
            </div>

            <div class="produtos-grid" id="lista-produtos">
                <!-- Produtos carregados via JS -->
            </div>
        </section>
    </main>

    <!-- CARRINHO LATERAL -->
    <div class="carrinho-overlay" id="carrinho-overlay"></div>
    <aside class="carrinho" id="carrinho">
        <div class="carrinho-header">
            <h3>Seu Carrinho</h3>
            <button class="fechar-carrinho" id="fechar-carrinho">&times;</button>
        </div>
        <div class="carrinho-itens" id="carrinho-itens">
            <p class="carrinho-vazio">Seu carrinho está vazio</p>
        </div>
        <div class="carrinho-footer">
            <div class="carrinho-total">
                <span>Total:</span>
                <span id="carrinho-total">R$ 0,00</span>
            </div>
            <button class="btn-finalizar" id="finalizar-compra">Finalizar Compra</button>
        </div>
    </aside>

    <footer>
        <p>© 2026 Focinho e Cia - Todos os focinhos merecem carinho</p>
    </footer>

    <!-- BOTÃO FLUTUANTE VOLTAR AO TOPO -->
    <button class="topo-float" id="topo-float" aria-label="Voltar ao topo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
        <span class="topo-tooltip">Voltar ao topo</span>
    </button>

    <script>
        // MENU SANDUÍCHE
        const btnHamburger = document.querySelector('.menu-hamburger');
        const menuNav = document.querySelector('.menu-nav');

        btnHamburger.addEventListener('click', () => {
            menuNav.classList.toggle('active');
            btnHamburger.classList.toggle('active');
        });

        document.querySelectorAll('.menu-nav a').forEach(link => {
            link.addEventListener('click', () => {
                menuNav.classList.remove('active');
                btnHamburger.classList.remove('active');
            });
        });

        // PRODUTOS DA FOCINHO E CIA
        const produtos = [
            { id: 1, nome: "Ração Premium Cães Adultos 15kg", preco: 189.90, categoria: "racao", img: "img/produtos/racaocachorro.png" },
            { id: 2, nome: "Ração Hipoalergênica Gatos 7.5kg", preco: 149.90, categoria: "racao", img: "img/produtos/racao.png" },
            { id: 3, nome: "Brinquedo Mordedor Ossinho", preco: 29.90, categoria: "brinquedo", img: "img/produtos/mordedor.png" },
            { id: 4, nome: "Bolinha Interativa com Petisco", preco: 39.90, categoria: "brinquedo", img: "img/produtos/bolinha.png" },
            { id: 5, nome: "Coleira Peitoral Ajustável", preco: 59.90, categoria: "acessorio", img: "img/produtos/coleira.png" },
            { id: 6, nome: "Caminha Ortopédica G", preco: 199.90, categoria: "acessorio", img: "img/produtos/caminha.png" },
            { id: 7, nome: "Shampoo Hipoalergênico 500ml", preco: 34.90, categoria: "higiene", img: "img/produtos/shampoo.png" },
            { id: 8, nome: "Lenços Umedecidos Pet 80un", preco: 22.90, categoria: "higiene", img: "img/produtos/lenco.png" },
            { id: 9, nome: "Areia Higiênica Cat Life Biodegradável 4kg", preco: 39.90, categoria: "higiene", img: "img/produtos/areia.png" }
        ];

        let carrinho = JSON.parse(localStorage.getItem('carrinhoFocinho')) || [];

        const listaProdutos = document.getElementById('lista-produtos');
        const carrinhoItens = document.getElementById('carrinho-itens');
        const carrinhoTotal = document.getElementById('carrinho-total');
        const carrinhoContador = document.querySelector('.carrinho-contador');
        const carrinhoEl = document.getElementById('carrinho');
        const overlay = document.getElementById('carrinho-overlay');

        // RENDERIZAR PRODUTOS
        function renderizarProdutos(categoria = 'todos') {
            listaProdutos.innerHTML = '';
            const produtosFiltrados = categoria === 'todos' 
                ? produtos 
                : produtos.filter(p => p.categoria === categoria);

            produtosFiltrados.forEach(produto => {
                const card = document.createElement('div');
                card.className = 'produto-card';
                card.innerHTML = `
                    <img src="${produto.img}" alt="${produto.nome}">
                    <div class="produto-info">
                        <h3>${produto.nome}</h3>
                        <p class="produto-preco">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
                        <button class="btn-add-carrinho" onclick="addCarrinho(${produto.id})">
                            Adicionar ao Carrinho
                        </button>
                    </div>
                `;
                listaProdutos.appendChild(card);
            });
        }

        // FILTROS
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filtro-btn.active').classList.remove('active');
                btn.classList.add('active');
                renderizarProdutos(btn.dataset.categoria);
            });
        });

        // ADICIONAR AO CARRINHO
        function addCarrinho(id) {
            const produto = produtos.find(p => p.id === id);
            const itemExistente = carrinho.find(item => item.id === id);

            if (itemExistente) {
                itemExistente.qtd++;
            } else {
                carrinho.push({ ...produto, qtd: 1 });
            }

            salvarCarrinho();
            atualizarCarrinho();
            abrirCarrinho();
        }

        // ATUALIZAR CARRINHO
        function atualizarCarrinho() {
            if (carrinho.length === 0) {
                carrinhoItens.innerHTML = '<p class="carrinho-vazio">Seu carrinho está vazio</p>';
            } else {
                carrinhoItens.innerHTML = carrinho.map(item => `
                    <div class="carrinho-item">
                        <img src="${item.img}" alt="${item.nome}">
                        <div class="carrinho-item-info">
                            <h4>${item.nome}</h4>
                            <p>R$ ${item.preco.toFixed(2).replace('.', ',')}</p>
                            <div class="carrinho-qtd">
                                <button onclick="alterarQtd(${item.id}, -1)">-</button>
                                <span>${item.qtd}</span>
                                <button onclick="alterarQtd(${item.id}, 1)">+</button>
                            </div>
                        <button class="remover-item" onclick="removerItem(${item.id})">&times;</button>
                    </div>
                `).join('');
            }

            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            const qtdTotal = carrinho.reduce((sum, item) => sum + item.qtd, 0);
            
            carrinhoTotal.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
            carrinhoContador.textContent = qtdTotal;
            carrinhoContador.style.display = qtdTotal > 0 ? 'flex' : 'none';
        }

        function alterarQtd(id, delta) {
            const item = carrinho.find(item => item.id === id);
            item.qtd += delta;
            if (item.qtd <= 0) {
                removerItem(id);
            } else {
                salvarCarrinho();
                atualizarCarrinho();
            }
        }

        function removerItem(id) {
            carrinho = carrinho.filter(item => item.id !== id);
            salvarCarrinho();
            atualizarCarrinho();
        }

        function salvarCarrinho() {
            localStorage.setItem('carrinhoFocinho', JSON.stringify(carrinho));
        }

        // ABRIR/FECHAR CARRINHO
        function abrirCarrinho() {
            carrinhoEl.classList.add('active');
            overlay.classList.add('active');
        }

        function fecharCarrinho() {
            carrinhoEl.classList.remove('active');
            overlay.classList.remove('active');
        }

        document.getElementById('abrir-carrinho').addEventListener('click', abrirCarrinho);
        document.getElementById('fechar-carrinho').addEventListener('click', fecharCarrinho);
        overlay.addEventListener('click', fecharCarrinho);

        // FINALIZAR COMPRA
        document.getElementById('finalizar-compra').addEventListener('click', () => {
            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio!');
                return;
            }
            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            const mensagem = `Olá! Gostaria de finalizar meu pedido:\n\n${carrinho.map(item => `${item.qtd}x ${item.nome} - R$ ${(item.preco * item.qtd).toFixed(2)}`).join('\n')}\n\nTotal: R$ ${total.toFixed(2)}`;
            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(mensagem)}`, '_blank');
        });

        // BOTÃO VOLTAR AO TOPO
        const btnTopo = document.getElementById('topo-float');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                btnTopo.classList.add('visivel');
            } else {
                btnTopo.classList.remove('visivel');
            }
        });

        btnTopo.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // INICIALIZAR
        renderizarProdutos();
        atualizarCarrinho();
    </script>
</body>
</html>
